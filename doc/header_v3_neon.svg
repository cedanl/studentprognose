<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%">
        <animate attributeName="stop-color" values="#1a73e8;#00897b;#e53935;#e91e90;#7b1fa2;#66bb6a;#1a73e8" dur="16s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%">
        <animate attributeName="stop-color" values="#7b1fa2;#1a73e8;#00897b;#e53935;#e91e90;#7b1fa2;#7b1fa2" dur="16s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" values="#00897b;#e91e90;#7b1fa2;#66bb6a;#1a73e8;#00897b;#00897b" dur="16s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="200" rx="12" fill="#0a0a1a"/>
  <!-- Animated gradient overlay -->
  <rect width="800" height="200" rx="12" fill="url(#bg3)" opacity="0.35"/>

  <!-- Animated scan line -->
  <rect x="0" y="0" width="3" height="200" rx="1" fill="white" opacity="0.04">
    <animate attributeName="x" values="-3;803" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Neon chart lines -->
  <polyline points="40,170 110,155 180,148 250,130 320,108 390,95 460,72 530,55 600,50 670,35 740,28"
            fill="none" stroke="#00C9FF" stroke-width="2" opacity="0.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#softglow)"/>
  <polyline points="40,175 110,162 180,160 250,142 320,125 390,115 460,92 530,78 600,68 670,55 740,48"
            fill="none" stroke="#b388ff" stroke-width="1.5" opacity="0.3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pulsing data points -->
  <circle cx="740" cy="28" r="4" fill="#00C9FF" filter="url(#neon)">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="670" cy="35" r="3" fill="#92FE9D" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="50" r="3" fill="#ffd54f" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Title -->
  <text x="400" y="105" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700" fill="white" filter="url(#neon)">Studentprognose</text>

  <!-- Subtitle with neon accent -->
  <text x="400" y="135" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#00C9FF" letter-spacing="2" filter="url(#softglow)">Voorspel studentinstroom met geavanceerde modellen</text>

  <!-- Bottom bar -->
  <rect x="200" y="155" width="400" height="1" fill="#00C9FF" opacity="0.2">
    <animate attributeName="width" values="200;400;200" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x" values="300;200;300" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Tags -->
  <rect x="285" y="165" width="70" height="22" rx="11" fill="#00C9FF" opacity="0.1"/>
  <text x="320" y="180" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#00C9FF" opacity="0.9">SARIMA</text>

  <rect x="365" y="165" width="70" height="22" rx="11" fill="#b388ff" opacity="0.1"/>
  <text x="400" y="180" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#b388ff" opacity="0.9">XGBoost</text>

  <rect x="445" y="165" width="80" height="22" rx="11" fill="#92FE9D" opacity="0.1"/>
  <text x="485" y="180" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#92FE9D" opacity="0.9">Ensemble</text>
</svg>
