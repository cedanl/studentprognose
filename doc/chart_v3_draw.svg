    <animate attributeName="stroke-dashoffset" from="1200" to="0" dur="3s" fill="freeze" repeatCount="indefinite"/>
  </polyline>

  <!-- SARIMA (blue) - starts slightly later -->
  <polyline points="65,392 145,386 225,378 305,360 385,335 465,310 545,288 625,268 705,255 785,248 860,240"
            fill="none" stroke="#00C9FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="1200" stroke-dashoffset="1200">
    <animate attributeName="stroke-dashoffset" from="1200" to="0" dur="3s" begin="0.3s" fill="freeze" repeatCount="indefinite"/>
  </polyline>

  <!-- XGBoost (purple) -->
  <polyline points="65,390 145,384 225,370 305,345 385,308 465,278 545,252 625,235 705,222 785,215 860,210"
