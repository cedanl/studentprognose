<svg viewBox="0 0 900 460" width="900" height="460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gf3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#92FE9D" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#92FE9D" stop-opacity="0"/>
    </linearGradient>
    <filter id="sg3">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="460" rx="14" fill="#1a1a2e"/>

  <text x="32" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" fill="white">B Kunstmatige Intelligentie — Eerstejaars NL</text>
  <text x="32" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#888">Collegejaar 2024/2025 · Voorspelling vs. werkelijk</text>

  <!-- Metric cards -->
  <rect x="32" y="72" width="195" height="60" rx="10" fill="white" opacity="0.05"/>
  <text x="50" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888" letter-spacing="1">WERKELIJK</text>
  <text x="50" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#92FE9D">287</text>

  <rect x="243" y="72" width="195" height="60" rx="10" fill="white" opacity="0.05"/>
  <text x="261" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888" letter-spacing="1">SARIMA</text>
  <text x="261" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#00C9FF">241</text>

  <rect x="454" y="72" width="195" height="60" rx="10" fill="white" opacity="0.05"/>
  <text x="472" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888" letter-spacing="1">XGBOOST</text>
  <text x="472" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#b388ff">263</text>

  <rect x="665" y="72" width="195" height="60" rx="10" fill="white" opacity="0.05"/>
  <text x="683" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888" letter-spacing="1">ENSEMBLE</text>
  <text x="683" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#ffd54f">258</text>

  <!-- Legend -->
  <circle cx="50" cy="156" r="5" fill="#92FE9D"/>
  <text x="62" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ccc">Werkelijk</text>
  <circle cx="160" cy="156" r="5" fill="#00C9FF"/>
  <text x="172" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ccc">SARIMA</text>
  <circle cx="260" cy="156" r="5" fill="#b388ff"/>
  <text x="272" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ccc">XGBoost</text>
  <circle cx="368" cy="156" r="5" fill="#ffd54f"/>
  <text x="380" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ccc">Ensemble</text>

  <!-- Y-axis -->
  <text x="55" y="192" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="end">300</text>
  <text x="55" y="242" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="end">250</text>
  <text x="55" y="292" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="end">200</text>
  <text x="55" y="342" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="end">150</text>
  <text x="55" y="392" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="end">100</text>

  <!-- Grid -->
  <line x1="65" y1="188" x2="860" y2="188" stroke="#333" stroke-width="0.5"/>
  <line x1="65" y1="238" x2="860" y2="238" stroke="#333" stroke-width="0.5"/>
  <line x1="65" y1="288" x2="860" y2="288" stroke="#333" stroke-width="0.5"/>
  <line x1="65" y1="338" x2="860" y2="338" stroke="#333" stroke-width="0.5"/>
  <line x1="65" y1="388" x2="860" y2="388" stroke="#333" stroke-width="0.5"/>
  <line x1="65" y1="188" x2="65" y2="395" stroke="#555" stroke-width="1"/>
  <line x1="65" y1="395" x2="860" y2="395" stroke="#555" stroke-width="1"/>

  <!-- Area fill -->
  <polygon points="65,388 145,380 225,360 305,330 385,290 465,260 545,230 625,210 705,198 785,192 860,188 860,395 65,395" fill="url(#gf3)"/>

  <!-- Lines with draw-on animation using stroke-dashoffset -->
  <!-- Werkelijk (green) -->
  <polyline points="65,388 145,380 225,360 305,330 385,290 465,260 545,230 625,210 705,198 785,192 860,188"
