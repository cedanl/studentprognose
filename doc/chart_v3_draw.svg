      <animate attributeName="x1" values="65;860;860;65" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
      <animate attributeName="x2" values="65;860;860;65" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
    </line>

    <!-- Dots following each line -->
    <circle r="6" fill="#92FE9D" opacity="0.9" filter="url(#sg3)">
      <animate attributeName="cx" values="65;860;860;65" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
      <animate attributeName="cy" values="388;188;188;388" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
    </circle>
    <circle r="5" fill="#00C9FF" opacity="0.85">
      <animate attributeName="cx" values="65;860;860;65" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
      <animate attributeName="cy" values="392;240;240;392" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
    </circle>
    <circle r="5" fill="#b388ff" opacity="0.85">
      <animate attributeName="cx" values="65;860;860;65" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
      <animate attributeName="cy" values="390;210;210;390" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
    </circle>
    <circle r="5" fill="#ffd54f" opacity="0.85">
      <animate attributeName="cx" values="65;860;860;65" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
      <animate attributeName="cy" values="391;224;224;391" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
    </circle>

    <!-- Tooltip -->
    <rect width="90" height="74" rx="6" fill="#2a2a4a" stroke="#555" stroke-width="0.5">
      <animate attributeName="x" values="75;830;830;75" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
      <animate attributeName="y" values="300;120;120;300" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
    </rect>
    <text font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="600" fill="#92FE9D">
      <animate attributeName="x" values="83;838;838;83" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
      <animate attributeName="y" values="316;136;136;316" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
      Werkelijk: 287
    </text>
    <text font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="600" fill="#00C9FF">
      <animate attributeName="x" values="83;838;838;83" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
      <animate attributeName="y" values="330;150;150;330" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
      SARIMA: 241
    </text>
    <text font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="600" fill="#b388ff">
      <animate attributeName="x" values="83;838;838;83" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
      <animate attributeName="y" values="344;164;164;344" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
      XGBoost: 263
    </text>
    <text font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="600" fill="#ffd54f">
      <animate attributeName="x" values="83;838;838;83" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
      <animate attributeName="y" values="358;178;178;358" dur="7s" repeatCount="indefinite" keyTimes="0;0.42;0.58;1"/>
      Ensemble: 258
    </text>
  </g>

  <!-- X-axis -->
  <text x="65" y="412" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 1</text>
  <text x="145" y="412" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 5</text>
  <text x="225" y="412" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 10</text>
  <text x="305" y="412" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 15</text>
  <text x="385" y="412" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 20</text>
  <text x="465" y="412" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 25</text>
  <text x="545" y="412" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 30</text>
  <text x="625" y="412" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 35</text>
  <text x="705" y="412" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 40</text>
  <text x="785" y="412" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 45</text>
  <text x="860" y="412" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 52</text>
</svg>
