<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%">
        <animate attributeName="stop-color" values="#0D47A1;#00695C;#B71C1C;#AD1457;#4A148C;#2E7D32;#0D47A1" dur="18s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%">
        <animate attributeName="stop-color" values="#4A148C;#0D47A1;#00695C;#B71C1C;#AD1457;#4A148C;#4A148C" dur="18s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" values="#00695C;#AD1457;#4A148C;#2E7D32;#0D47A1;#00695C;#00695C" dur="18s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="acc1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C9FF"/>
      <stop offset="100%" stop-color="#92FE9D"/>
    </linearGradient>
    <filter id="g1">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="200" rx="12" fill="url(#bg1)"/>

  <!-- Wave decoration -->
  <path d="M0,170 Q100,150 200,165 T400,155 T600,168 T800,150" fill="none" stroke="white" stroke-width="1" opacity="0.06"/>
  <path d="M0,180 Q100,160 200,175 T400,165 T600,178 T800,160" fill="none" stroke="white" stroke-width="0.8" opacity="0.04"/>

  <!-- Chart accent -->
  <polyline points="50,160 120,140 190,145 260,120 330,100 400,110 470,80 540,60 610,65 680,40 750,30"
            fill="none" stroke="url(#acc1)" stroke-width="2.5" opacity="0.25" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="750" cy="30" r="5" fill="#92FE9D" opacity="0.6" filter="url(#g1)">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Graduation cap -->
  <g transform="translate(310, 38)" fill="url(#acc1)" filter="url(#g1)">
    <polygon points="25,10 0,25 25,40 50,25" opacity="0.9"/>
    <rect x="23" y="25" width="4" height="18" rx="1" opacity="0.7"/>
    <path d="M10,27 L10,42 Q25,52 40,42 L40,27" fill="none" stroke="url(#acc1)" stroke-width="2" opacity="0.7"/>
  </g>

  <text x="400" y="108" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="40" font-weight="700" fill="white" filter="url(#g1)">Studentprognose</text>
  <text x="400" y="138" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="url(#acc1)" letter-spacing="2">Voorspel studentinstroom met geavanceerde modellen</text>

  <rect x="310" y="150" width="180" height="24" rx="12" fill="white" opacity="0.1"/>
  <text x="400" y="167" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#92FE9D" letter-spacing="1">SARIMA · XGBoost · Ensemble</text>
</svg>
