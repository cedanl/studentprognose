<svg viewBox="0 0 900 440" width="900" height="440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#92FE9D" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#92FE9D" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="440" rx="14" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="32" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" fill="white">B Kunstmatige Intelligentie — Eerstejaars NL</text>
  <text x="32" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#888">Collegejaar 2024/2025 · Voorspelling vs. werkelijk</text>

  <!-- Metric cards -->
  <!-- Werkelijk -->
  <rect x="32" y="72" width="195" height="60" rx="10" fill="white" opacity="0.05"/>
  <text x="50" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888" letter-spacing="1">WERKELIJK</text>
  <text x="50" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#92FE9D">287</text>

  <!-- SARIMA -->
  <rect x="243" y="72" width="195" height="60" rx="10" fill="white" opacity="0.05"/>
  <text x="261" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888" letter-spacing="1">SARIMA</text>
  <text x="261" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#00C9FF">279</text>

  <!-- XGBoost -->
  <rect x="454" y="72" width="195" height="60" rx="10" fill="white" opacity="0.05"/>
  <text x="472" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888" letter-spacing="1">XGBOOST</text>
  <text x="472" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#b388ff">283</text>

  <!-- Ensemble -->
  <rect x="665" y="72" width="195" height="60" rx="10" fill="white" opacity="0.05"/>
  <text x="683" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888" letter-spacing="1">ENSEMBLE</text>
  <text x="683" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#ffd54f">281</text>

  <!-- Legend -->
  <circle cx="50" cy="156" r="5" fill="#92FE9D"/>
  <text x="62" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ccc">Werkelijk</text>
  <circle cx="160" cy="156" r="5" fill="#00C9FF"/>
  <text x="172" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ccc">SARIMA</text>
  <circle cx="260" cy="156" r="5" fill="#b388ff"/>
  <text x="272" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ccc">XGBoost</text>
  <circle cx="368" cy="156" r="5" fill="#ffd54f"/>
  <text x="380" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ccc">Ensemble</text>

  <!-- Chart area -->
  <!-- Y-axis labels -->
  <text x="55" y="190" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="end">300</text>
  <text x="55" y="237" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="end">250</text>
  <text x="55" y="284" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="end">200</text>
  <text x="55" y="331" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="end">150</text>
  <text x="55" y="378" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="end">100</text>

  <!-- Grid lines -->
  <line x1="65" y1="186" x2="870" y2="186" stroke="#333" stroke-width="0.5"/>
  <line x1="65" y1="233" x2="870" y2="233" stroke="#333" stroke-width="0.5"/>
  <line x1="65" y1="280" x2="870" y2="280" stroke="#333" stroke-width="0.5"/>
  <line x1="65" y1="327" x2="870" y2="327" stroke="#333" stroke-width="0.5"/>
  <line x1="65" y1="374" x2="870" y2="374" stroke="#333" stroke-width="0.5"/>

  <!-- Axes -->
  <line x1="65" y1="186" x2="65" y2="380" stroke="#555" stroke-width="1"/>
  <line x1="65" y1="380" x2="870" y2="380" stroke="#555" stroke-width="1"/>

  <!-- Area fill under Werkelijk line -->
  <polygon points="65,374 145,368 225,352 305,338 385,312 465,292 545,268 625,250 705,232 785,218 865,210 865,380 65,380"
           fill="url(#greenFill)"/>

  <!-- Werkelijk (green) - main line -->
  <polyline points="65,374 145,368 225,352 305,338 385,312 465,292 545,268 625,250 705,232 785,218 865,210"
            fill="none" stroke="#92FE9D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- SARIMA (blue) -->
  <polyline points="65,372 145,365 225,356 305,340 385,316 465,298 545,274 625,256 705,238 785,224 865,218"
            fill="none" stroke="#00C9FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- XGBoost (purple) -->
  <polyline points="65,370 145,366 225,358 305,336 385,318 465,296 545,272 625,254 705,234 785,222 865,214"
            fill="none" stroke="#b388ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Ensemble (yellow dashed) -->
  <polyline points="65,371 145,366 225,354 305,337 385,314 465,294 545,272 625,254 705,236 785,222 865,216"
            fill="none" stroke="#ffd54f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8,4" opacity="0.85"/>

  <!-- End dots with glow -->
  <circle cx="865" cy="210" r="5" fill="#92FE9D" opacity="0.9">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="865" cy="218" r="4" fill="#00C9FF" opacity="0.8"/>
  <circle cx="865" cy="214" r="4" fill="#b388ff" opacity="0.8"/>
  <circle cx="865" cy="216" r="4" fill="#ffd54f" opacity="0.8"/>

  <!-- X-axis labels -->
  <text x="65" y="398" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 1</text>
  <text x="145" y="398" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 5</text>
  <text x="225" y="398" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 10</text>
  <text x="305" y="398" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 15</text>
  <text x="385" y="398" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 20</text>
  <text x="465" y="398" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 25</text>
  <text x="545" y="398" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 30</text>
  <text x="625" y="398" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 35</text>
  <text x="705" y="398" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 40</text>
  <text x="785" y="398" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 45</text>
  <text x="865" y="398" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">wk 52</text>

  <!-- Convergence annotation -->
  <line x1="305" y1="186" x2="305" y2="380" stroke="#ffd54f" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="310" y="200" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ffd54f" opacity="0.7">↑ modellen convergeren</text>
</svg>
