<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes gradient {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }
        .container {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          margin: 0;
          width: 100%;
          height: 200px;
          background: linear-gradient(-45deg, #0F2027, #203A43, #2C5364, #0F2027);
          background-size: 400% 400%;
          animation: gradient 15s ease infinite;
          border-radius: 12px;
          color: white;
          text-align: center;
          font-family: 'Segoe UI', Arial, sans-serif;
          position: relative;
          overflow: hidden;
        }
        .icon {
          font-size: 38px;
          margin-bottom: 4px;
        }
        .title {
          font-size: 40px;
          font-weight: 700;
          letter-spacing: 1px;
          text-shadow: 0 0 20px rgba(0, 201, 255, 0.3);
        }
        .subtitle {
          font-size: 15px;
          letter-spacing: 2px;
          background: linear-gradient(90deg, #00C9FF, #92FE9D);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          margin-top: 6px;
        }
        .pill {
          margin-top: 10px;
          padding: 4px 16px;
          border-radius: 12px;
          background: rgba(255,255,255,0.1);
          font-size: 12px;
          color: #92FE9D;
          letter-spacing: 1px;
        }
      </style>
      <div class="container">
        <div class="icon">🎓</div>
        <div class="title">Studentprognose</div>
        <div class="subtitle">Voorspel studentinstroom met geavanceerde modellen</div>
        <div class="pill">SARIMA · XGBoost · Ensemble</div>
      </div>
    </div>
  </foreignObject>
</svg>
