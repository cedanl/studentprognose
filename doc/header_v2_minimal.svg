<svg width="800" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%">
        <animate attributeName="stop-color" values="#1565C0;#00838F;#C62828;#C2185B;#6A1B9A;#388E3C;#1565C0" dur="18s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" values="#6A1B9A;#1565C0;#00838F;#C62828;#C2185B;#6A1B9A;#6A1B9A" dur="18s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect width="800" height="180" rx="14" fill="url(#bg2)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="white" stroke-width="0.5">
    <line x1="0" y1="45" x2="800" y2="45"/>
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="135" x2="800" y2="135"/>
    <line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="400" y1="0" x2="400" y2="180"/>
    <line x1="600" y1="0" x2="600" y2="180"/>
  </g>

  <!-- Title block -->
  <text x="400" y="65" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="800" fill="white" letter-spacing="-1">Studentprognose</text>

  <!-- Divider line -->
  <line x1="280" y1="82" x2="520" y2="82" stroke="white" stroke-width="2" opacity="0.3">
    <animate attributeName="x1" values="280;260;280" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="520;540;520" dur="4s" repeatCount="indefinite"/>
  </line>

  <text x="400" y="108" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="white" opacity="0.8" letter-spacing="3">VOORSPEL STUDENTINSTROOM</text>

  <!-- Model tags -->
  <rect x="230" y="125" width="80" height="24" rx="12" fill="white" opacity="0.12"/>
  <text x="270" y="141" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="white" opacity="0.9">SARIMA</text>

  <rect x="322" y="125" width="80" height="24" rx="12" fill="white" opacity="0.12"/>
  <text x="362" y="141" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="white" opacity="0.9">XGBoost</text>

  <rect x="414" y="125" width="90" height="24" rx="12" fill="white" opacity="0.12"/>
  <text x="459" y="141" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="white" opacity="0.9">Ensemble</text>

  <!-- Corner accents -->
  <circle cx="30" cy="30" r="20" fill="white" opacity="0.03"/>
  <circle cx="770" cy="150" r="25" fill="white" opacity="0.03"/>
</svg>
