<svg viewBox="0 0 900 460" width="900" height="460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow filters -->
    <filter id="gl" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gl2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Confidence band gradients -->
    <linearGradient id="bandEns" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd54f" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#ffd54f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffd54f" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="bandInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd54f" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#ffd54f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffd54f" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <rect width="900" height="460" rx="14" fill="#0a0a16"/>

  <!-- Title -->
  <text x="32" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" fill="white">B Kunstmatige Intelligentie — Eerstejaars NL</text>
  <text x="32" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#666">Collegejaar 2024/2025 · Ensemble voorspelling met foutmarges</text>

  <!-- Metric cards -->
  <rect x="32" y="72" width="125" height="56" rx="10" fill="#92FE9D" opacity="0.07"/>
  <text x="46" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#888" letter-spacing="1">WERKELIJK</text>
  <text x="46" y="117" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#92FE9D">287</text>

  <rect x="170" y="72" width="125" height="56" rx="10" fill="#ffd54f" opacity="0.07"/>
  <text x="184" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#888" letter-spacing="1">ENSEMBLE</text>
  <text x="184" y="117" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#ffd54f">281</text>

  <rect x="308" y="72" width="125" height="56" rx="10" fill="white" opacity="0.04"/>
  <text x="322" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#888" letter-spacing="1">MAE</text>
  <text x="322" y="117" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#ff8a80">4.2</text>

  <rect x="446" y="72" width="125" height="56" rx="10" fill="white" opacity="0.04"/>
  <text x="460" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#888" letter-spacing="1">MAPE</text>
  <text x="460" y="117" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#ff8a80">1.5%</text>

  <rect x="584" y="72" width="145" height="56" rx="10" fill="white" opacity="0.04"/>
  <text x="598" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#888" letter-spacing="1">95% INTERVAL</text>
  <text x="598" y="117" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#aaa">269 – 293</text>

  <rect x="742" y="72" width="125" height="56" rx="10" fill="#92FE9D" opacity="0.07"/>
  <text x="756" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#888" letter-spacing="1">STATUS</text>
  <text x="756" y="117" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#92FE9D">Stabiel ✓</text>

  <!-- Legend -->
  <circle cx="50" cy="152" r="5" fill="#92FE9D" filter="url(#gl2)"/>
  <text x="62" y="156" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ccc">Werkelijk</text>
  <circle cx="160" cy="152" r="5" fill="#ffd54f" filter="url(#gl2)"/>
  <text x="172" y="156" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ccc">Ensemble</text>
  <rect x="260" y="147" width="20" height="10" rx="3" fill="#ffd54f" opacity="0.15"/>
  <text x="286" y="156" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ccc">68% interval</text>
  <rect x="395" y="147" width="20" height="10" rx="3" fill="#ffd54f" opacity="0.08"/>
  <text x="421" y="156" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ccc">95% interval</text>

  <!-- Y-axis -->
  <text x="55" y="188" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="end">320</text>
  <text x="55" y="228" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="end">280</text>
  <text x="55" y="268" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="end">240</text>
  <text x="55" y="308" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="end">200</text>
  <text x="55" y="348" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="end">160</text>
  <text x="55" y="388" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="end">120</text>

  <!-- Grid -->
  <line x1="65" y1="184" x2="860" y2="184" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="65" y1="224" x2="860" y2="224" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="65" y1="264" x2="860" y2="264" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="65" y1="304" x2="860" y2="304" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="65" y1="344" x2="860" y2="344" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="65" y1="384" x2="860" y2="384" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="65" y1="184" x2="65" y2="392" stroke="#333" stroke-width="1"/>
  <line x1="65" y1="392" x2="860" y2="392" stroke="#333" stroke-width="1"/>

  <!-- 95% confidence band (outer, wider) -->
  <polygon points="65,382 145,375 225,360 305,338 385,305 465,275 545,248 625,232 705,222 785,218 860,215
                   860,200 785,203 705,205 625,210 545,218 465,230 385,250 305,278 225,310 145,345 65,368"
           fill="url(#bandEns)" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite"/>
  </polygon>

  <!-- 68% confidence band (inner, narrower) -->
  <polygon points="65,378 145,370 225,354 305,330 385,296 465,268 545,242 625,228 705,218 785,214 860,212
                   860,203 785,206 705,209 625,215 545,224 465,240 385,260 305,290 225,322 145,355 65,372"
           fill="url(#bandInner)" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
  </polygon>

  <!-- Ensemble prediction line (yellow, strong glow) -->
  <polyline points="65,375 145,362 225,338 305,310 385,278 465,254 545,233 625,222 705,213 785,210 860,208"
            fill="none" stroke="#ffd54f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
  <!-- Extra glow layer -->
  <polyline points="65,375 145,362 225,338 305,310 385,278 465,254 545,233 625,222 705,213 785,210 860,208"
            fill="none" stroke="#ffd54f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glSoft)" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
  </polyline>

  <!-- Werkelijk line (green, strong glow) -->
  <polyline points="65,380 145,368 225,345 305,315 385,280 465,252 545,228 625,216 705,210 785,207 860,205"
            fill="none" stroke="#92FE9D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
  <!-- Extra glow layer -->
  <polyline points="65,380 145,368 225,345 305,315 385,280 465,252 545,228 625,216 705,210 785,207 860,205"
            fill="none" stroke="#92FE9D" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glSoft)" opacity="0.25">
    <animate attributeName="opacity" values="0.15;0.35;0.15" dur="3.5s" repeatCount="indefinite"/>
  </polyline>

  <!-- Convergence zone marker -->
  <rect x="545" y="184" width="315" height="208" rx="0" fill="#92FE9D" opacity="0.02"/>
  <line x1="545" y1="184" x2="545" y2="392" stroke="#92FE9D" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.25"/>
  <text x="555" y="198" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#92FE9D" opacity="0.5">stabiel vanaf wk 30</text>

  <!-- Animated end dots -->
  <circle cx="860" cy="205" r="6" fill="#92FE9D" filter="url(#gl)">
    <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="860" cy="208" r="5" fill="#ffd54f" filter="url(#gl2)">
    <animate attributeName="r" values="4;7;4" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Animated cycling highlight glow on prediction -->
  <polyline points="65,375 145,362 225,338 305,310 385,278 465,254 545,233 625,222 705,213 785,210 860,208"
            fill="none" stroke="#ffd54f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glSoft)">
    <animate attributeName="opacity" values="0;0.3;0.5;0.3;0" dur="5s" repeatCount="indefinite"/>
  </polyline>
  <polyline points="65,380 145,368 225,345 305,315 385,280 465,252 545,228 625,216 705,210 785,207 860,205"
            fill="none" stroke="#92FE9D" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glSoft)">
    <animate attributeName="opacity" values="0.3;0;0;0;0.3" dur="5s" repeatCount="indefinite"/>
  </polyline>

  <!-- X-axis -->
  <text x="65" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="middle">wk 1</text>
  <text x="145" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="middle">wk 5</text>
  <text x="225" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="middle">wk 10</text>
  <text x="305" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="middle">wk 15</text>
  <text x="385" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="middle">wk 20</text>
  <text x="465" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="middle">wk 25</text>
  <text x="545" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="middle">wk 30</text>
  <text x="625" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="middle">wk 35</text>
  <text x="705" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="middle">wk 40</text>
  <text x="785" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="middle">wk 45</text>
  <text x="860" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#444" text-anchor="middle">wk 52</text>

  <!-- Bottom label -->
  <text x="450" y="440" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#555">Wekelijks cumulatieve aanmeldingen → Ensemble voorspelling met 68% en 95% betrouwbaarheidsinterval</text>
</svg>
