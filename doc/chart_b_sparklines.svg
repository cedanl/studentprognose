  <text x="72" y="254" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#666">vs</text>
  <text x="90" y="254" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#ffd54f">405</text>
  <text x="130" y="254" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ff8a80">MAE 5.1</text>
