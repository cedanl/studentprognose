  <circle cx="860" cy="301" r="3" fill="#ffd54f">
    <animate attributeName="r" values="2;4;2" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="860" cy="304" r="2.5" fill="#92FE9D" opacity="0.8"/>

  <!-- Row 4: B Sociologie -->
  <rect x="20" y="371" width="860" height="82" rx="8" fill="white" opacity="0.03"/>
  <text x="36" y="394" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="white">B Sociologie</text>
  <text x="36" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#666">NL · Eerstejaars</text>
  <text x="36" y="438" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#92FE9D">89</text>
  <text x="65" y="438" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#666">vs</text>
  <text x="83" y="438" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#ffd54f">92</text>
  <text x="115" y="438" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#92FE9D">MAE 2.1</text>
  <polygon points="240,444 320,440 400,434 480,426 560,418 640,412 720,408 800,406 860,405
