<svg viewBox="0 0 900 480" width="900" height="480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sg" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="480" rx="14" fill="#0d0d1a"/>

  <!-- Header -->
  <text x="32" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600" fill="white">Voorspellingen per opleiding</text>
  <text x="32" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#666">Collegejaar 2024/2025 · Ensemble vs. werkelijk per programma</text>

  <!-- Legend -->
  <circle cx="50" cy="76" r="4" fill="#92FE9D"/>
  <text x="60" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#999">Werkelijk</text>
  <circle cx="145" cy="76" r="4" fill="#ffd54f"/>
  <text x="155" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#999">Ensemble</text>
  <rect x="230" y="72" width="14" height="8" rx="2" fill="#ffd54f" opacity="0.15"/>
  <text x="250" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#999">95% interval</text>

  <!-- Row 1: B Kunstmatige Intelligentie -->
  <rect x="20" y="95" width="860" height="82" rx="8" fill="white" opacity="0.03"/>
  <text x="36" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="white">B Kunstmatige Intelligentie</text>
  <text x="36" y="134" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#666">NL · Eerstejaars</text>
  <text x="36" y="162" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#92FE9D">287</text>
  <text x="72" y="162" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#666">vs</text>
  <text x="90" y="162" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#ffd54f">281</text>
  <text x="130" y="162" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ff8a80">MAE 4.2</text>
  <!-- Sparkline chart area -->
  <polygon points="240,168 320,164 400,156 480,145 560,135 640,128 720,124 800,122 860,121
                   860,115 800,116 720,117 640,120 560,126 480,134 400,144 320,155 240,162"
           fill="#ffd54f" opacity="0.08"/>
  <polyline points="240,165 320,160 400,150 480,140 560,130 640,124 720,120 800,119 860,118"
            fill="none" stroke="#ffd54f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#sg)"/>
  <polyline points="240,168 320,162 400,155 480,142 560,133 640,126 720,122 800,120 860,119"
            fill="none" stroke="#92FE9D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <circle cx="860" cy="118" r="3" fill="#ffd54f">
    <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="860" cy="119" r="2.5" fill="#92FE9D" opacity="0.8"/>

  <!-- Row 2: B Geneeskunde -->
  <rect x="20" y="187" width="860" height="82" rx="8" fill="white" opacity="0.03"/>
  <text x="36" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="white">B Geneeskunde</text>
