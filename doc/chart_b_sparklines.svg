            fill="none" stroke="#92FE9D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <circle cx="860" cy="401" r="3" fill="#ffd54f">
    <animate attributeName="r" values="2;4;2" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="860" cy="403" r="2.5" fill="#92FE9D" opacity="0.8"/>

  <!-- X-axis labels (shared) -->
  <text x="240" y="470" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#444" text-anchor="middle">wk 10</text>
  <text x="400" y="470" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#444" text-anchor="middle">wk 20</text>
  <text x="560" y="470" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#444" text-anchor="middle">wk 30</text>
  <text x="720" y="470" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#444" text-anchor="middle">wk 40</text>
  <text x="860" y="470" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#444" text-anchor="middle">wk 52</text>
</svg>
