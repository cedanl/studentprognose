  </circle>
  <circle cx="860" cy="210" r="2.5" fill="#92FE9D" opacity="0.8"/>

  <!-- Row 3: B Psychologie -->
  <rect x="20" y="279" width="860" height="82" rx="8" fill="white" opacity="0.03"/>
  <text x="36" y="302" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="white">B Psychologie</text>
  <text x="36" y="318" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#666">NL · Eerstejaars</text>
  <text x="36" y="346" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#92FE9D">356</text>
  <text x="72" y="346" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#666">vs</text>
  <text x="90" y="346" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#ffd54f">348</text>
  <text x="130" y="346" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#92FE9D">MAE 3.8</text>
  <polygon points="240,352 320,348 400,340 480,330 560,320 640,313 720,308 800,306 860,305
