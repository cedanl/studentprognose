<svg viewBox="0 0 900 460" width="900" height="460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gf1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#92FE9D" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#92FE9D" stop-opacity="0"/>
    </linearGradient>
    <filter id="cg1">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="460" rx="14" fill="#1a1a2e"/>

