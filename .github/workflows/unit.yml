name: Unit tests

on:
  workflow_call:

jobs:
  test:
    name: Unit tests (${{ matrix.os }}, Python 3.12)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --group dev --extra gui

      - name: Run unit tests
        run: uv run pytest tests/ -v
