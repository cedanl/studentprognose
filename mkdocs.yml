site_name: Studentprognose
site_description: Methodologische documentatie voor het voorspellen van eerstejaars instroom in het hoger onderwijs
site_url: https://cedanl.github.io/studentprognose/
repo_url: https://github.com/cedanl/studentprognose
repo_name: cedanl/studentprognose
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

theme:
  name: material
  language: nl
  logo: assets/header.svg
  favicon: assets/header.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Donker thema
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Licht thema
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search:
      lang: nl
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:
      base_path: ["."]
  - admonition
  - pymdownx.details
  - attr_list
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/iframe-theme.js

nav:
  - Home: index.md
  - Aan de slag:
    - Snelstart (5 min): snelstart.md
    - Installeren: installeren.md
    - Je data klaarzetten: je-data-voorbereiden.md
    - Draaien & CLI: aan-de-slag.md
    - Grafische interface: gui.md
    - Output lezen: output-begrijpen.md
  - Configuratie:
    - Basis: configuratie.md
    - Referentie: configuratie-referentie.md
    - Validatie: validatie.md
  - Methodologie:
    - methodologie/index.md
    - Individueel model: methodologie/individueel.md
    - SARIMA: methodologie/sarima.md
    - XGBoost: methodologie/xgboost.md
    - Ratio-model: methodologie/ratio-model.md
    - Ensemble: methodologie/ensemble.md
    - Benchmarks: methodologie/benchmarks.md
  - Gevorderd & naslag:
    - Gevorderd gebruik: gevorderd-gebruik.md
    - Begrippen: begrippen.md
    - API-referentie:
      - api/index.md
      - Modellen: api/models.md
      - Strategies: api/strategies.md
    - Presentatie: presentatie.md
